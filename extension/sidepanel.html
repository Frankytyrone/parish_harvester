<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parish Trainer</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #111827;
        color: #f9fafb;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 12px;
      }
      .wrap { padding: 10px 12px; }
      h1 { margin: 0 0 4px; font-size: 15px; display: flex; align-items: center; gap: 6px; }
      .guided-badge {
        background: #16a34a; color: #fff; border-radius: 4px;
        padding: 1px 5px; font-size: 9px; font-weight: 600;
      }
      #status {
        margin: 0 0 8px; opacity: 0.92; line-height: 1.35; font-size: 11px;
        padding: 4px 6px; border-radius: 4px; display: none;
      }
      #status.ok  { background: #14532d; color: #86efac; display: block; }
      #status.err { background: #7f1d1d; color: #fca5a5; display: block; }
      #status.info { background: #1e3a5f; color: #93c5fd; display: block; }
      .section {
        background: #1e293b; border: 1px solid #374151; border-radius: 6px;
        padding: 7px 8px; margin-bottom: 7px;
      }
      .section-title {
        font-size: 10px; font-weight: 600; color: #93c5fd; margin-bottom: 5px;
      }
      .btn-col { display: flex; flex-direction: column; gap: 5px; }
      button {
        border: none; border-radius: 6px; padding: 6px 10px;
        background: #2563eb; color: #fff; cursor: pointer;
        font-size: 11px; text-align: left; line-height: 1.3;
        font-family: inherit; width: 100%;
      }
      button:hover { filter: brightness(1.15); }
      button.green { background: #16a34a; }
      button.grey  { background: #374151; }
      .note { margin: 8px 0 0; line-height: 1.35; font-size: 10px; color: #6b7280; }
      details summary { cursor: pointer; font-size: 10px; color: #6b7280; margin-top: 6px; }
      details .inner { margin-top: 5px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Parish Trainer <span class="guided-badge">Guided ✓</span></h1>

      <p id="status">Ready.</p>

      <!-- Guided mode wizard — 3 simple choices -->
      <div class="section">
        <div class="section-title">What do you see on screen?</div>
        <div class="btn-col">
          <button id="wizard-pdf" class="green">📄 Get a PDF (recommended)</button>
          <button id="wizard-image">🖼️ Get an image (newsletter screenshot)</button>
          <button id="wizard-pick-image">🖼️ Pick an image on this page</button>
          <button id="wizard-link">🔗 I need to click something first</button>
        </div>
      </div>

      <!-- Advanced / More options -->
      <details>
        <summary>⚙️ Advanced / More options</summary>
        <div class="inner section">
          <div class="btn-col">
            <button id="wizard-iframe" type="button">📐 It's in a frame / viewer</button>
            <button id="mark-html" type="button">Mark Page as HTML</button>
            <button id="mark-file" type="button">Mark Current URL as File</button>
            <button id="crop-btn"  type="button">Crop Bulletin Image</button>
          </div>
          <p class="note">Right-click an image on the page → "Mark as Bulletin Image"</p>
        </div>
      </details>
    </div>
    <script src="sidepanel.js"></script>
  </body>
</html>
