<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parish Trainer</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        width: 320px;
        background: #111827;
        color: #f9fafb;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        font-size: 12px;
      }
      .wrap {
        padding: 12px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 16px;
      }
      #status {
        margin: 0 0 10px;
        opacity: 0.92;
        line-height: 1.35;
      }
      .row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      button {
        border: none;
        border-radius: 8px;
        padding: 6px 8px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
        font-size: 12px;
      }
      .note {
        margin: 10px 0 0;
        line-height: 1.35;
      }
      .section {
        background: #1e293b;
        border: 1px solid #374151;
        border-radius: 6px;
        padding: 8px;
        margin-top: 10px;
      }
      details.section {
        padding-top: 6px;
      }
      details.section summary {
        cursor: pointer;
        list-style: none;
      }
      details.section summary::-webkit-details-marker {
        display: none;
      }
      details.section summary::before {
        content: "▸ ";
        color: #93c5fd;
      }
      details.section[open] summary::before {
        content: "▾ ";
      }
      .section-title {
        font-size: 10px;
        font-weight: 600;
        color: #93c5fd;
        margin-bottom: 0;
      }
      .section-content {
        margin-top: 6px;
      }
      label {
        font-size: 10px;
        color: #93c5fd;
        display: block;
        margin-bottom: 2px;
      }
      input[type="text"],
      input[type="password"] {
        width: 100%;
        border: 1px solid #374151;
        border-radius: 4px;
        padding: 4px 6px;
        background: #0f172a;
        color: #f9fafb;
        font-size: 10px;
        margin-bottom: 5px;
        box-sizing: border-box;
        font-family: inherit;
      }
      button.green {
        background: #16a34a;
      }
      #gh-save-status {
        margin-top: 4px;
        font-size: 10px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Parish Trainer</h1>
      <p id="status">Showing toolbar...</p>
      <div class="row">
        <button id="open-operator" type="button">Open Operator Console</button>
      </div>

      <details class="section" id="gh-settings">
        <summary class="section-title">🔑 GitHub Settings</summary>
        <div class="section-content">
          <label for="gh-pat">Personal Access Token</label>
          <input id="gh-pat" type="password" placeholder="ghp_…" />
          <label for="gh-repo">Repository (owner/repo)</label>
          <input id="gh-repo" type="text" placeholder="Frankytyrone/parish_harvester" />
          <button id="gh-save" type="button" class="green">💾 Save settings</button>
          <p id="gh-save-status"></p>
        </div>
      </details>

      <p class="note">Page actions (PDF, image, crop, links) are on the floating toolbar.</p>
      <p class="note">Tip: Open Operator Console to browse parishes, update links, and manage the mega PDF.</p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
