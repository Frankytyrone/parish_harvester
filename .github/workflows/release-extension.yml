# Uses the cardinalby webext-buildtools actions because they are dedicated CRX pack/sign actions
# with active maintenance and explicit support for self-hosted Chromium update manifests.
name: Release Parish Trainer extension

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Extension version (X.Y.Z)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: version must be X.Y.Z, got '$VERSION'."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate manifest version matches release version
        run: |
          set -euo pipefail
          MANIFEST_VERSION=$(python3 -c "import json, pathlib; print(json.loads(pathlib.Path('extension/manifest.json').read_text(encoding='utf-8')).get('version',''))")
          if [ "$MANIFEST_VERSION" != "${{ steps.release.outputs.version }}" ]; then
            echo "Error: extension/manifest.json version is '$MANIFEST_VERSION' but release version is '${{ steps.release.outputs.version }}'."
            echo "If this was a tag release, retag with the matching manifest version."
            exit 1
          fi

      - name: Decode extension signing key and derive app ID
        id: key
        env:
          EXTENSION_PRIVATE_KEY: ${{ secrets.EXTENSION_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${EXTENSION_PRIVATE_KEY:-}" ]; then
            echo "Error: EXTENSION_PRIVATE_KEY secret is not set."
            exit 1
          fi

          mkdir -p build
          printf '%s' "$EXTENSION_PRIVATE_KEY" | base64 --decode > build/key.pem
          chmod 600 build/key.pem

          PUB_DER_B64=$(openssl rsa -in build/key.pem -pubout -outform DER | base64 -w 0)
          APP_ID=$(printf '%s' "$PUB_DER_B64" | base64 --decode | sha256sum | awk '{print $1}' | cut -c1-32 | tr '0-9a-f' 'a-p')

          {
            echo "private_key_pem<<EOF"
            cat build/key.pem
            echo "EOF"
            echo "app_id=$APP_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Pack extension directory to zip
        uses: cardinalby/webext-buildtools-pack-extension-dir-action@v1
        with:
          extensionDir: extension
          zipFilePath: build/parish-trainer-${{ steps.release.outputs.tag }}.zip

      - name: Build signed CRX
        uses: cardinalby/webext-buildtools-chrome-crx-action@v2
        with:
          zipFilePath: build/parish-trainer-${{ steps.release.outputs.tag }}.zip
          crxFilePath: build/parish-trainer-${{ steps.release.outputs.tag }}.crx
          privateKey: ${{ steps.key.outputs.private_key_pem }}

      - name: Upload CRX build artifact
        uses: actions/upload-artifact@v4
        with:
          name: parish-trainer-${{ steps.release.outputs.tag }}.crx
          path: build/parish-trainer-${{ steps.release.outputs.tag }}.crx

      - name: Compute CRX SHA-256
        run: |
          set -euo pipefail
          SHA256=$(sha256sum build/parish-trainer-${{ steps.release.outputs.tag }}.crx | awk '{print $1}')
          echo "CRX_SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Parish Trainer ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: |
            build/parish-trainer-${{ steps.release.outputs.tag }}.crx

      - name: Update root updates.xml
        run: |
          set -euo pipefail
          cat > updates.xml <<EOF
          <?xml version='1.0' encoding='UTF-8'?>
          <gupdate xmlns='http://www.google.com/update2/response' protocol='2.0'>
            <app appid='${{ steps.key.outputs.app_id }}'>
              <updatecheck codebase='https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}/parish-trainer-${{ steps.release.outputs.tag }}.crx' version='${{ steps.release.outputs.version }}' />
            </app>
          </gupdate>
          EOF

      - name: Commit and push updates.xml to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add updates.xml
          if git diff --cached --quiet; then
            echo "updates.xml already up to date."
            exit 0
          fi
          git commit -m "chore: update extension feed to ${{ steps.release.outputs.tag }} [skip ci]"
          git push origin HEAD:main

      - name: Publish release summary
        run: |
          {
            echo "## Parish Trainer release summary"
            echo ""
            echo "- Version: ${{ steps.release.outputs.version }}"
            echo "- Tag: ${{ steps.release.outputs.tag }}"
            echo "- App ID: ${{ steps.key.outputs.app_id }}"
            echo "- CRX SHA-256: ${CRX_SHA256}"
            echo "- CRX URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.release.outputs.tag }}/parish-trainer-${{ steps.release.outputs.tag }}.crx"
          } >> "$GITHUB_STEP_SUMMARY"
