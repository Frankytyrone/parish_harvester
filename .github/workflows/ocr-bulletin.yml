name: Generate OCR bulletin viewers

on:
  workflow_run:
    workflows: ["Harvest Parish Bulletins"]
    types:
      - completed

permissions:
  contents: write

jobs:
  generate-ocr-viewers:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-ocr.txt

      - name: Install poppler
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          pip install -r requirements.txt -r requirements-ocr.txt

      - name: Download mega PDF artifacts from harvest run
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: "*-mega-bulletin-pdf"
          path: /tmp/ocr-bulletins/
          merge-multiple: true

      - name: Generate OCR viewer pages
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TODAY="$(date -u +%Y-%m-%d)"
          mkdir -p /tmp/ocr-bulletins
          for diocese in derry down_and_connor; do
            workdir="/tmp/ocr-bulletins/${diocese}"
            mkdir -p "${workdir}"
            pdf_path="$(find /tmp/ocr-bulletins -type f -name "${diocese}_mega_bulletin.pdf" | head -n 1)"
            ocr_html="${workdir}/bulletin-${TODAY}.html"
            if [ -z "${pdf_path}" ] || [ ! -s "${pdf_path}" ]; then
              echo "Error: missing downloaded mega PDF artifact: ${pdf_path}"
              exit 1
            fi
            (
              cd "${workdir}"
              python "${GITHUB_WORKSPACE}/ocr/convert_bulletin.py" "${pdf_path}" "${TODAY}"
            )
            python ocr/generate_bulletin_pages.py \
              --diocese "${diocese}" \
              --date "${TODAY}" \
              --pdf "${pdf_path}" \
              --ocr-html "${ocr_html}"
          done

      - name: Commit generated bulletin pages
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --cached --quiet && exit 0
          git commit -m "chore: update OCR bulletin viewers for $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
