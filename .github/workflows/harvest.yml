name: Harvest Parish Bulletins

on:
  schedule:
    - cron: '0 13 * * 0'   # Every Sunday at 13:00 UTC
  workflow_dispatch:
    inputs:
      diocese:
        description: 'Diocese to harvest (or "all" for every diocese)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - derry_diocese
          - down_and_connor
      target_parish:
        description: 'Parish key for instant single-parish rebuild (leave empty for full run)'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  issues: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run Bulletin Harvester
        run: |
          ARGS="--diocese ${{ github.event.inputs.diocese || 'all' }}"
          if [ -n "${{ github.event.inputs.target_parish }}" ]; then
            ARGS="$ARGS --target-parish ${{ github.event.inputs.target_parish }}"
          fi
          python main.py $ARGS
        env:
          HARVEST_EMAIL_TO: ${{ secrets.HARVEST_EMAIL_TO }}
          HARVEST_EMAIL_FROM: ${{ secrets.HARVEST_EMAIL_FROM }}
          EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          MAILGUN_API_KEY: ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN: ${{ secrets.MAILGUN_DOMAIN }}

      - name: Write workflow step summary
        if: always()
        run: |
          if [ -f Bulletins/report.json ]; then
            python - <<'PYEOF'
          import json, os
          d = json.load(open("Bulletins/report.json"))
          s = d.get("summary", {})
          dl = s.get("downloaded", 0)
          hl = s.get("html_links", 0)
          fa = s.get("failed", 0)
          total = dl + fa
          rate = f"{dl/total*100:.1f}%" if total > 0 else "N/A"
          lines = [
              f"## 📋 Bulletin Harvest — {d.get('target_date','?')}",
              "",
              f"| Metric | Value |",
              f"|--------|-------|",
              f"| ✅ Downloaded | {dl} |",
              f"| 🔗 HTML links | {hl} |",
              f"| 💥 Failed | {fa} |",
              f"| 📈 Success rate | {rate} |",
              "",
          ]
          if d.get("failed"):
              lines += ["### ❌ Failed parishes (need re-training)", ""]
              for f in d["failed"]:
                  lines.append(f"- **{f['display_name']}** — _{f.get('error','?')[:120]}_")
              lines.append("")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as fh:
              fh.write("\n".join(lines))
          PYEOF
          fi

      - name: Post GitHub Issue summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f Bulletins/report.json ]; then
            DIOCESE="${{ github.event.inputs.diocese || 'all' }}"
            REPORT_DATE=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d.get('target_date','unknown'))")
            DOWNLOADED=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['downloaded'])")
            HTML_LINKS=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['html_links'])")
            FAILED=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['failed'])")
            FAILED_LIST=$(python -c "
          import json
          d = json.load(open('Bulletins/report.json'))
          ffs = d.get('failed', [])
          if ffs:
              lines = []
              for f in ffs:
                  lines.append(f\"- **{f['display_name']}** ({f.get('url','')})  \")
                  lines.append(f\"  _Reason: {f.get('error','unknown')}_\")
              print('\n'.join(lines))
          else:
              print('_None_ \U0001f389')
          ")
            HTML_LIST=$(python -c "
          import json
          d = json.load(open('Bulletins/report.json'))
          hls = d.get('html_links', [])
          if hls:
              print('\n'.join(f\"- **{h['display_name']}**: [{h['url']}]({h['url']})\" for h in hls))
          else:
              print('_None_')
          ")
            BODY="## 📋 Bulletin Harvest Report — ${DIOCESE} — ${REPORT_DATE}

          **Diocese:** \`${DIOCESE}\`

          | Category | Count |
          |----------|-------|
          | ✅ Downloaded | ${DOWNLOADED} |
          | 🔗 HTML links | ${HTML_LINKS} |
          | 💥 Failed | ${FAILED} |

          ### Failed Parishes

          ${FAILED_LIST}

          ### HTML-Only Parishes (links in mega PDF)

          ${HTML_LIST}

          [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

            ISSUE_TITLE="📋 Bulletin Harvest Report — ${DIOCESE} — ${REPORT_DATE}"

            # Close superseded open reports for this same diocese only
            gh issue list \
              --state open \
              --json number,title \
              --limit 100 \
              --jq ".[] | select(.title | startswith(\"📋 Bulletin Harvest Report — ${DIOCESE} — \")) | select(.title != \"${ISSUE_TITLE}\") | .number" \
              | xargs -r -I{} gh issue close {} --comment "Superseded by newer harvest report." || true

            # Find existing open issue with exactly today's diocese+date title
            EXISTING_ISSUE=$(gh issue list \
              --state open \
              --json number,title \
              --limit 100 \
              --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" \
              | head -n 1)

            if [ -n "${EXISTING_ISSUE}" ]; then
              echo "Updating existing issue #${EXISTING_ISSUE}"
              gh issue edit "${EXISTING_ISSUE}" --body "${BODY}"
            else
              echo "Creating new issue"
              gh issue create \
                --title "${ISSUE_TITLE}" \
                --body "${BODY}" \
                --label "harvest-report" 2>/dev/null || \
              gh issue create \
                --title "${ISSUE_TITLE}" \
                --body "${BODY}" || true
            fi
          fi

      - name: Commit bulletins back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Bulletins/ || true
          git diff --cached --quiet || git commit -m "chore: add harvested bulletins for $(date +%Y-%m-%d) [skip ci]"
          git push || true

      - name: Prepare standalone Mega PDF artifact
        if: always()
        run: |
          if [ -f Bulletins/report.json ]; then
            TARGET_DATE=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d.get('target_date',''))")
            MEGA_PDF="Bulletins/all_bulletins_${TARGET_DATE}.pdf"
            if [ -f "${MEGA_PDF}" ]; then
              cp "${MEGA_PDF}" Bulletins/mega_bulletin.pdf
              echo "Prepared standalone Mega PDF: Bulletins/mega_bulletin.pdf"
            else
              echo "Mega PDF not found at expected path: ${MEGA_PDF}"
            fi
          fi

      - name: Upload Mega Bulletin PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Mega-Bulletin-PDF
          path: Bulletins/mega_bulletin.pdf
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Bulletins artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bulletins-${{ github.run_id }}
          path: Bulletins/
          retention-days: 30

      - name: Upload dashboard artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harvest-dashboard-${{ github.run_id }}
          path: Bulletins/dashboard.html
          retention-days: 30
