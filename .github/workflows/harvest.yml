name: Harvest Parish Bulletins

on:
  schedule:
    - cron: '0 6 * * 6'   # Every Saturday at 06:00 UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: read

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Install poppler (required by pdf2image)
        run: sudo apt-get install -y poppler-utils

      - name: Run Bulletin Harvester
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python main.py --diocese derry_diocese

      - name: Upload Bulletins artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bulletins-${{ github.run_id }}
          path: Bulletins/
          retention-days: 30
