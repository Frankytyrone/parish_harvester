name: Harvest Parish Bulletins

on:
  schedule:
    - cron: '0 12 * * 0'   # Every Sunday at 12:00 UTC (12:00/13:00 UK time)
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write
  issues: write
  models: read

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Install poppler (required by pdf2image)
        run: sudo apt-get install -y poppler-utils

      - name: Run Bulletin Harvester
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python main.py --diocese derry_diocese

      - name: Post GitHub Issue summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f Bulletins/report.json ]; then
            REPORT_DATE=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d.get('target_date','unknown'))")
            FRESH=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['fresh'])")
            STALE=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['stale'])")
            UNKNOWN=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['unknown'])")
            ERRORS=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['errors'])")
            FAILED=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary'].get('failed_fetches',0))")
            ERROR_LIST=$(python -c "
          import json
          d = json.load(open('Bulletins/report.json'))
          errs = d.get('errors', [])
          if errs:
              print('\n'.join(f\"- **{e['parish']}**: {e['verdict']}\" for e in errs))
          else:
              print('_No verification errors this run_ 🎉')
          ")
            FAILED_LIST=$(python -c "
          import json
          d = json.load(open('Bulletins/report.json'))
          ffs = d.get('failed_fetches', [])
          if ffs:
              lines = []
              for f in ffs:
                  lines.append(f\"- **{f['parish']}** ({f.get('url','')})  \")
                  lines.append(f\"  _Reason: {f.get('error','unknown')}_\")
              print('\n'.join(lines))
          else:
              print('_None_ 🎉')
          ")
            STALE_LIST=$(python -c "
          import json
          d = json.load(open('Bulletins/report.json'))
          stale = d.get('stale', [])
          if stale:
              print('\n'.join(f\"- **{s['parish']}**: \`{s['file']}\`\" for s in stale))
          else:
              print('_None_ 🎉')
          ")
            BODY="## 📋 Bulletin Harvest Report — ${REPORT_DATE}

          | Category | Count |
          |----------|-------|
          | ✅ Fresh   | ${FRESH} |
          | ❌ Stale   | ${STALE} |
          | ⚠️ Unknown | ${UNKNOWN} |
          | 💥 Errors  | ${ERRORS} |
          | 🚫 Failed  | ${FAILED} |

          ### Failed Parishes

          ${FAILED_LIST}

          ### Stale Bulletins

          ${STALE_LIST}

          ### Verification Errors

          ${ERROR_LIST}

          [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            ISSUE_TITLE="📋 Bulletin Harvest Report — ${REPORT_DATE}"
            EXISTING_ISSUE=$(gh issue list \
              --state open \
              --search "${ISSUE_TITLE}" \
              --json number,title \
              --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" \
              | head -n 1)

            if [ -n "${EXISTING_ISSUE}" ]; then
              echo "Updating existing issue #${EXISTING_ISSUE}"
              gh issue edit "${EXISTING_ISSUE}" --body "${BODY}"
            else
              echo "Creating new issue"
              gh issue create \
                --title "${ISSUE_TITLE}" \
                --body "${BODY}" \
                --label "harvest-report" 2>/dev/null || \
              gh issue create \
                --title "${ISSUE_TITLE}" \
                --body "${BODY}" || true
            fi
          fi

      - name: Commit history and review files back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Bulletins/history/ Bulletins/copilot_review.md parishes/parish_profiles.json || true
          # Only commit if there are staged changes
          git diff --cached --quiet || git commit -m "chore: update harvest history, profiles and copilot review [skip ci]"
          git push || true

      - name: Upload Bulletins artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bulletins-${{ github.run_id }}
          path: Bulletins/
          retention-days: 30
