name: Harvest Parish Bulletins

on:
  schedule:
    - cron: '0 13 * * 0'   # Every Sunday at 13:00 UTC
  workflow_dispatch:
    inputs:
      diocese:
        description: 'Diocese to harvest'
        required: true
        default: 'derry_diocese'
        type: choice
        options:
          - derry_diocese
          - down_and_connor

permissions:
  contents: write
  issues: write

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run Bulletin Harvester
        run: python main.py --diocese ${{ github.event.inputs.diocese || 'derry_diocese' }}

      - name: Post GitHub Issue summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f Bulletins/report.json ]; then
            REPORT_DATE=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d.get('target_date','unknown'))")
            DOWNLOADED=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['downloaded'])")
            HTML_LINKS=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['html_links'])")
            FAILED=$(python -c "import json; d=json.load(open('Bulletins/report.json')); print(d['summary']['failed'])")
            FAILED_LIST=$(python -c "
          import json
          d = json.load(open('Bulletins/report.json'))
          ffs = d.get('failed', [])
          if ffs:
              lines = []
              for f in ffs:
                  lines.append(f\"- **{f['display_name']}** ({f.get('url','')})  \")
                  lines.append(f\"  _Reason: {f.get('error','unknown')}_\")
              print('\n'.join(lines))
          else:
              print('_None_ \U0001f389')
          ")
            HTML_LIST=$(python -c "
          import json
          d = json.load(open('Bulletins/report.json'))
          hls = d.get('html_links', [])
          if hls:
              print('\n'.join(f\"- **{h['display_name']}**: [{h['url']}]({h['url']})\" for h in hls))
          else:
              print('_None_')
          ")
            BODY="## 📋 Bulletin Harvest Report — ${REPORT_DATE}

          | Category | Count |
          |----------|-------|
          | ✅ Downloaded | ${DOWNLOADED} |
          | 🔗 HTML links | ${HTML_LINKS} |
          | 💥 Failed     | ${FAILED} |

          ### Failed Parishes

          ${FAILED_LIST}

          ### HTML-Only Parishes (links in mega PDF)

          ${HTML_LIST}

          [View workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

            ISSUE_TITLE="📋 Bulletin Harvest Report — ${REPORT_DATE}"

                       # Close all open harvest report issues that are NOT for today's date
            gh issue list \
              --state open \
              --json number,title \
              --limit 100 \
              --jq ".[] | select(.title | startswith(\"📋 Bulletin Harvest Report\")) | select(.title != \"${ISSUE_TITLE}\") | .number" \
              | xargs -r -I{} gh issue close {} --comment "Superseded by newer harvest report." || true

            # Find existing open issue with exactly today's title
            EXISTING_ISSUE=$(gh issue list \
              --state open \
              --json number,title \
              --limit 100 \
              --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" \
              | head -n 1)

            if [ -n "${EXISTING_ISSUE}" ]; then
              echo "Updating existing issue #${EXISTING_ISSUE}"
              gh issue edit "${EXISTING_ISSUE}" --body "${BODY}"
            else
              echo "Creating new issue"
              gh issue create \
                --title "${ISSUE_TITLE}" \
                --body "${BODY}" || true
            fi
            EXISTING_ISSUE=$(gh issue list \
              --label "harvest-report" \
              --state open \
              --json number,title \
              --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" \
              | head -n 1)

            if [ -n "${EXISTING_ISSUE}" ]; then
              echo "Updating existing issue #${EXISTING_ISSUE}"
              gh issue edit "${EXISTING_ISSUE}" --body "${BODY}"
            else
              echo "Creating new issue"
              gh issue create \
                --title "${ISSUE_TITLE}" \
                --body "${BODY}" \
                --label "harvest-report" 2>/dev/null || \
              gh issue create \
                --title "${ISSUE_TITLE}" \
                --body "${BODY}" || true
            fi
          fi

      - name: Commit bulletins back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Bulletins/ || true
          git diff --cached --quiet || git commit -m "chore: add harvested bulletins for $(date +%Y-%m-%d) [skip ci]"
          git push || true

      - name: Upload Bulletins artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bulletins-${{ github.run_id }}
          path: Bulletins/
          retention-days: 30
