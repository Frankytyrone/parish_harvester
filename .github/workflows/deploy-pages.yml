name: Deploy mega PDFs to GitHub Pages
# Core release workflow. Keep independent from advisory Copilot workflows,
# which can be rate-limited (HTTP 429) and should not block pages publishing.

on:
  workflow_run:
    workflows: ["Harvest Parish Bulletins"]
    types:
      - completed
  push:
    branches: [main]
    paths:
      - extension/**
      - updates.xml
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: write

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download mega PDF artifacts from harvest run
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}
          pattern: "*-mega-bulletin-pdf"
          path: _harvest_artifacts
          merge-multiple: true

      - name: Verify mega PDFs for Pages deploy
        env:
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id || '' }}
        run: |
          set -euo pipefail
          mkdir -p mega_pdf
          # Remove any stale PDFs before copying this run's verified artifacts.
          find mega_pdf -maxdepth 1 -type f -name '*_mega_bulletin.pdf' -delete
          if [ -d _harvest_artifacts ]; then
            while IFS= read -r -d '' pdf; do
              dest="mega_pdf/$(basename "${pdf}")"
              if [ -e "${dest}" ]; then
                echo "Error: duplicate mega PDF filename downloaded: ${dest}"
                exit 1
              fi
              cp "${pdf}" "${dest}"
            done < <(find _harvest_artifacts -type f -name '*_mega_bulletin.pdf' -print0)
          fi
          shopt -s nullglob
          pdfs=(mega_pdf/*_mega_bulletin.pdf)
          if [ "${EVENT_NAME}" = "workflow_run" ] && [ ${#pdfs[@]} -eq 0 ]; then
            echo "Error: no mega PDF artifacts were downloaded from workflow run ${WORKFLOW_RUN_ID:-unknown}."
            echo "Check that the upstream Harvest Parish Bulletins run succeeded, uploaded the diocesan *-mega-bulletin-pdf artifacts, and that those artifacts have not expired."
            exit 1
          fi
          for pdf in "${pdfs[@]}"; do
            if [ ! -s "${pdf}" ]; then
              echo "Error: mega PDF is missing or empty: ${pdf}"
              exit 1
            fi
            python - "${pdf}" <<'PY'
from pathlib import Path
import sys

path = Path(sys.argv[1])
if path.read_bytes()[:5] != b"%PDF-":
    raise SystemExit(f"Error: file does not look like a PDF: {path}")
PY
            ls -lh "${pdf}"
          done

      - name: Build Pages site (mega PDFs + extension updates)
        env:
          CHROME_EXTENSION_APP_ID: ${{ vars.CHROME_EXTENSION_APP_ID }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          if [ -d mega_pdf ]; then
            cp -a mega_pdf/. _site/
          fi

          mkdir -p _site/extension
          zip -qr _site/extension/parish_trainer.zip extension
          if [ ! -s _site/extension/parish_trainer.zip ]; then
            echo "Error: extension package was not generated or is empty: _site/extension/parish_trainer.zip"
            exit 1
          fi

          VERSION=$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("extension/manifest.json").read_text(encoding="utf-8"))
          print(manifest.get("version", "0.0.0"))
          PY
          )
          PREV_VERSION="unknown"
          MANIFEST_BUMPED="false"
          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            PREV_VERSION=$(git show HEAD^:extension/manifest.json 2>/dev/null | python -c 'import json,sys; t=sys.stdin.read().strip(); print(json.loads(t).get("version","unknown") if t else "unknown")')
            if git diff --name-only HEAD^ HEAD | grep -qx 'extension/manifest.json'; then
              MANIFEST_BUMPED="true"
            fi
          fi
          if [ -z "${CHROME_EXTENSION_APP_ID:-}" ]; then
            if [ "${EVENT_NAME}" = "push" ]; then
              echo "Error: CHROME_EXTENSION_APP_ID repository variable must be set for extension update publishing."
              echo "Set it in Settings > Secrets and variables > Actions > Variables."
              exit 1
            fi
            APP_ID="REPLACE_WITH_EXTENSION_ID"
          else
            APP_ID="${CHROME_EXTENSION_APP_ID}"
          fi
          PAGES_BASE="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          cat > _site/updates.xml <<XML
          <?xml version="1.0" encoding="UTF-8"?>
          <gupdate xmlns="http://www.google.com/update2/response" protocol="2.0">
            <app appid="${APP_ID}">
              <updatecheck codebase="${PAGES_BASE}/extension/parish_trainer.zip" version="${VERSION}" />
            </app>
          </gupdate>
          XML
          if ! grep -Fq "version=\"${VERSION}\"" _site/updates.xml; then
            echo "Error: generated updates.xml does not contain extension version ${VERSION}."
            exit 1
          fi
          if [ "${MANIFEST_BUMPED}" = "true" ] && [ "${EVENT_NAME}" = "push" ]; then
            if [ ! -s _site/extension/parish_trainer.zip ]; then
              echo "Error: extension version changed (${PREV_VERSION} -> ${VERSION}) but package is missing."
              exit 1
            fi
            if ! grep -Fq "version=\"${VERSION}\"" _site/updates.xml; then
              echo "Error: extension version changed (${PREV_VERSION} -> ${VERSION}) but updates.xml was not updated."
              exit 1
            fi
          fi

          {
            echo "EXTENSION_PREV_VERSION=${PREV_VERSION}"
            echo "EXTENSION_NEW_VERSION=${VERSION}"
            echo "EXTENSION_MANIFEST_BUMPED=${MANIFEST_BUMPED}"
            echo "EXTENSION_PACKAGE_URL=${PAGES_BASE}/extension/parish_trainer.zip"
            echo "EXTENSION_UPDATES_URL=${PAGES_BASE}/updates.xml"
          } >> "$GITHUB_ENV"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish deploy summary
        run: |
          set -euo pipefail
          {
            echo "## 🚀 Pages deploy summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Previous extension version | ${EXTENSION_PREV_VERSION:-unknown} |"
            echo "| New extension version | ${EXTENSION_NEW_VERSION:-unknown} |"
            echo "| Manifest changed in commit | ${EXTENSION_MANIFEST_BUMPED:-false} |"
            echo "| Extension package URL | ${EXTENSION_PACKAGE_URL:-not-set} |"
            echo "| Update manifest URL | ${EXTENSION_UPDATES_URL:-not-set} |"
            echo "| Deployed Pages URL | ${{ steps.deployment.outputs.page_url }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean mega PDFs from repository after deploy
        if: github.event_name == 'workflow_run'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p mega_pdf Bulletins/current
          find mega_pdf -maxdepth 1 -type f -name '*.pdf' -delete || true
          find Bulletins/current -maxdepth 1 -type f -name '*.pdf' -delete || true
          find Bulletins -maxdepth 1 -type f -name 'all_bulletins_*.pdf' -delete || true
          touch mega_pdf/.gitkeep Bulletins/current/.gitkeep
          shopt -s nullglob
          pdfs=(Bulletins/all_bulletins_*.pdf)
          git add -A mega_pdf Bulletins/current "${pdfs[@]}"
          git diff --cached --quiet || git commit -m "chore: clean deployed PDFs [skip ci]"
          git push origin HEAD:main || true
