name: Deploy mega PDFs to GitHub Pages

on:
  workflow_run:
    workflows: ["Harvest Parish Bulletins"]
    types:
      - completed
  push:
    branches: [main]
    paths:
      - extension/**
      - updates.xml
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Pages site (mega PDFs + extension updates)
        env:
          CHROME_EXTENSION_APP_ID: ${{ vars.CHROME_EXTENSION_APP_ID }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          if [ -d mega_pdf ]; then
            cp -a mega_pdf/. _site/
          fi

          mkdir -p _site/extension
          zip -qr _site/extension/parish_trainer.zip extension

          VERSION=$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("extension/manifest.json").read_text(encoding="utf-8"))
          print(manifest.get("version", "0.0.0"))
          PY
          )
          if [ -z "${CHROME_EXTENSION_APP_ID:-}" ]; then
            if [ "${EVENT_NAME}" = "push" ]; then
              echo "Error: CHROME_EXTENSION_APP_ID repository variable must be set for extension update publishing."
              echo "Set it in Settings > Secrets and variables > Actions > Variables."
              exit 1
            fi
            APP_ID="REPLACE_WITH_EXTENSION_ID"
          else
            APP_ID="${CHROME_EXTENSION_APP_ID}"
          fi
          PAGES_BASE="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          cat > _site/updates.xml <<XML
          <?xml version="1.0" encoding="UTF-8"?>
          <gupdate xmlns="http://www.google.com/update2/response" protocol="2.0">
            <app appid="${APP_ID}">
              <updatecheck codebase="${PAGES_BASE}/extension/parish_trainer.zip" version="${VERSION}" />
            </app>
          </gupdate>
          XML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
